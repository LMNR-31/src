# drone_config.yaml
# ROS 2 parameter file for the drone_controller_completo node.
# Launch with:
#   ros2 run my_drone_controller drone_node \
#            --ros-args --params-file /path/to/drone_config.yaml

drone_controller_completo:
  ros__parameters:
    # ── Altitude ────────────────────────────────────────────────────────
    # Target hover altitude (metres)
    hover_altitude: 2.0

    # Hysteresis margin below hover_altitude used to detect arrival (metres)
    hover_altitude_margin: 0.05

    # Maximum permitted altitude for incoming waypoints (metres)
    max_altitude: 500.0

    # Time spent publishing each waypoint during trajectory execution (seconds)
    waypoint_duration: 4.0

    # ── Validation limits ────────────────────────────────────────────────
    # Maximum allowed |X| or |Y| distance for incoming waypoints (metres)
    max_waypoint_distance: 100.0

    # Minimum flight altitude – waypoints with Z in [land_z_threshold, min_altitude)
    # are rejected; only Z < land_z_threshold (landing intent) is allowed below this.
    min_altitude: 0.2

    # Z value below which the drone is considered to be landing (metres)
    land_z_threshold: 0.1

    # ── Takeoff Z boost ──────────────────────────────────────────────────
    # Minimum Z increment (metres) added to the current odometry altitude when
    # computing the takeoff setpoint immediately after arming.
    #
    # After ARM is accepted in OFFBOARD mode, PX4 starts an auto-disarm timer
    # if no upward movement is detected.  The effective takeoff target is:
    #   target_z = max(hover_altitude, current_z_real + takeoff_z_boost)
    # This guarantees the FCU sees a clear climb intent and does not disarm.
    # Recommended: 0.7 m (at least 0.5 m above ground to trigger PX4 movement detection).
    takeoff_z_boost: 0.7

    # ── Takeoff XY sanitization ──────────────────────────────────────────
    # If the requested takeoff XY is within this radius of the map origin (metres),
    # AND a recent latch pose is available, the takeoff XY is overridden with the
    # latch pose XY.  This prevents the drone from flying back to near (0,0) after
    # a landing cycle when the mission takeoff publisher had not yet received the
    # latch pose.
    takeoff_xy_origin_threshold_m: 0.2

    # Maximum age of a stored latch pose before it is considered stale (seconds).
    # Latch poses older than this value are not used to override takeoff XY.
    latch_pose_max_age_s: 10.0

    # ── Timeouts ─────────────────────────────────────────────────────────
    # Timeout waiting for OFFBOARD + ARM confirmation from FCU (seconds)
    activation_timeout: 3.0

    # Timeout before a pending command is automatically marked TIMEOUT (seconds)
    command_timeout: 15.0

    # Time to wait after landing is detected before requesting DISARM (seconds)
    landing_timeout: 3.0

    # Timeout waiting for FCU to confirm OFFBOARD mode before sending ARM (seconds).
    # ARM is only sent after the FCU reports mode == "OFFBOARD"; this parameter
    # controls how long to wait for that confirmation before retrying OFFBOARD.
    # Recommended: 5.0 s (PX4 typically confirms within 200 ms when setpoints flow).
    offboard_confirm_timeout: 5.0
